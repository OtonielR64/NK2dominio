name: Deploy to Hostinger

on:
  push:
    branches: [main, principal]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nk2app/package-lock.json

      - name: Install dependencies
        working-directory: nk2app
        run: npm ci

      - name: Build
        working-directory: nk2app
        run: npm run build
        env:
          VITE_API_URL: https://nuevokennedy2.online/api

      - name: Generate config.php with real credentials
        run: |
          cat > backend/api/config.php << 'PHPEOF'
          <?php
          define('DB_HOST',    'localhost');
          define('DB_NAME',    '${{ secrets.DB_NAME }}');
          define('DB_USER',    '${{ secrets.DB_USER }}');
          define('DB_PASS',    '${{ secrets.DB_PASS }}');
          define('DB_CHARSET', 'utf8mb4');
          define('JWT_SECRET', '${{ secrets.JWT_SECRET }}');
          define('JWT_EXP',    28800);
          define('ALLOWED_ORIGIN', 'https://nuevokennedy2.online');
          define('APP_TZ', 'America/Bogota');
          date_default_timezone_set(APP_TZ);
          PHPEOF

      - name: Deploy frontend (dist/) to public_html/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: nk2app/dist/
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Deploy PHP backend to public_html/api/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: backend/api/
          server-dir: /api/
          exclude: |
            **/.git*
