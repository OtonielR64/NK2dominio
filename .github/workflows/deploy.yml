name: Deploy to Hostinger

on:
  push:
    branches: [main, principal]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nk2app/package-lock.json

      - name: Install dependencies
        working-directory: nk2app
        run: npm ci

      - name: Build
        working-directory: nk2app
        run: npm run build
        env:
          VITE_API_URL: https://nuevokennedy2.online/api

      - name: Deploy frontend (dist/) to public_html/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: nk2app/dist/
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Deploy PHP backend to public_html/api/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: backend/api/
          server-dir: /api/
          exclude: |
            **/.git*
