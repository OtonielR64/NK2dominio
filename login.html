<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso — NK2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #f4f3f0;
    color: #1a1a18;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border: 1px solid #dddbd6;
    border-radius: 6px;
    width: 100%;
    max-width: 360px;
    overflow: hidden;
  }
  .card-header {
    background: #1a1a18;
    color: #fff;
    padding: 16px 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .card-header span {
    display: block;
    color: #888;
    font-size: 10px;
    margin-top: 4px;
    letter-spacing: 1px;
  }
  .card-body { padding: 24px 20px; }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: #6b6b66;
    margin-bottom: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }
  input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    border: 1px solid #dddbd6;
    border-radius: 6px;
    background: #fff;
    color: #1a1a18;
    font-family: 'IBM Plex Sans', sans-serif;
    outline: none;
    transition: border-color .15s;
  }
  input[type="password"]:focus { border-color: #999; }
  input[type="password"].err { border-color: #c0392b; background: #fdf3f2; }
  .err-msg {
    font-size: 11px;
    color: #c0392b;
    margin-top: 5px;
    min-height: 16px;
    display: none;
  }
  .err-msg.show { display: block; }
  .btn-login {
    width: 100%;
    margin-top: 18px;
    padding: 11px;
    background: #1a5c2a;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: opacity .15s;
  }
  .btn-login:hover { opacity: .85; }
  .btn-login:active { opacity: .7; }
  .roles-info {
    margin-top: 18px;
    border-top: 1px solid #f0ede8;
    padding-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .role-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #6b6b66;
    font-family: 'IBM Plex Mono', monospace;
  }
  .role-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-admin { background: #1a5c2a; }
  .dot-visor { background: #2c3e7a; }
  .footer-note {
    margin-top: 20px;
    font-size: 11px;
    color: #aaa;
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    Comité Ornato y Seguridad · NK2
    <span>Ingresa tu contraseña para continuar</span>
  </div>
  <div class="card-body">
    <label for="pass">Contraseña</label>
    <input type="password" id="pass" placeholder="••••••••" autofocus
           onkeydown="if(event.key==='Enter') ingresar()">
    <div class="err-msg" id="err-msg">Contraseña incorrecta.</div>
    <button class="btn-login" onclick="ingresar()">Ingresar</button>

    <div class="roles-info">
      <div class="role-chip">
        <span class="role-dot dot-admin"></span>
        Admin — acceso completo (formularios + informes)
      </div>
      <div class="role-chip">
        <span class="role-dot dot-visor"></span>
        Visor — solo informes y consultas
      </div>
    </div>
  </div>
</div>

<p class="footer-note">Contacta al administrador si olvidaste tu contraseña.</p>

<script>
// ── Contraseñas por rol — cambia estos valores ─────────
const ROLES = {
  'NK2admin' : 'admin',   // Administrador — acceso total
  'NK2visor' : 'visor'    // Visor — solo informes
};
// ──────────────────────────────────────────────────────

const params = new URLSearchParams(location.search);
const nextURL = params.get('next') || 'index.html';

// Si ya hay sesión activa con el rol correcto, redirigir
const rolActual = localStorage.getItem('nk2_role');
if (rolActual === 'admin') {
  location.replace(nextURL);
} else if (rolActual === 'visor') {
  location.replace('informe.html');
}

function ingresar() {
  const input = document.getElementById('pass');
  const errEl = document.getElementById('err-msg');
  const rol   = ROLES[input.value];

  if (rol) {
    localStorage.setItem('nk2_role', rol);
    location.replace(rol === 'visor' ? 'informe.html' : nextURL);
  } else {
    input.classList.add('err');
    errEl.classList.add('show');
    input.value = '';
    input.focus();
  }
}

document.getElementById('pass').addEventListener('input', () => {
  document.getElementById('pass').classList.remove('err');
  document.getElementById('err-msg').classList.remove('show');
});
</script>
</body>
</html>
